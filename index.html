<!DOCTYPE html>
<html>
<head>
<title>control panel</title>
<style>
    body {background:#0f0f0f;color:#e0e0e0;font-family:monospace;margin:0;padding:20px}
    .container {max-width:960px;margin:auto;background:#1a1a1a;padding:25px;border-radius:8px;border:1px solid #333}
    h1 {color:#ffffff;text-align:center}
    input {background:#252525;color:#e0e0e0;border:1px solid #444;padding:12px;width:100%;box-sizing:border-box}
    button {background:#ffffff;color:#111;border:none;padding:12px 24px;margin:6px 4px;font-weight:bold;cursor:pointer;border-radius:4px}
    button:hover {background:#ddd}
    .stats {background:#1f1f1f;padding:18px;margin:20px 0;border:1px solid #444;border-radius:6px}
</style>
</head>
<body>
<div class="container">
    <h1>control panel</h1>

    <p>key: <input id="key" readonly></p>
    <button onclick="genKey()">new key</button>
    <button onclick="serverHop()">server hop</button>

    <div class="stats">
        <h3>leaderboard stats</h3>
        <div id="stats">waiting for data</div>
    </div>

    <div id="s">ready</div>
</div>

<script>
let myKey = localStorage.getItem("controlkey") || "";

function genKey() {
    myKey = "k_" + Math.random().toString(36).substr(2, 12);
    localStorage.setItem("controlkey", myKey);
    document.getElementById("key").value = myKey;
}

if (myKey) document.getElementById("key").value = myKey;
else genKey();

function serverHop() {
    fetch("/api/execute", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({key: myKey, script: `game.TeleportService:Teleport(10449761463)`})
    });
}

// auto get stats
setInterval(() => {
    fetch("/api/stats?key=" + myKey)
    .then(r => r.json())
    .then(d => {
        document.getElementById("stats").innerHTML = "kills: " + (d.kills || 0) + "<br>total kills: " + (d.total || 0);
    })
    .catch(() => {});
}, 5000);
</script>
</body>
</html>
