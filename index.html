<!DOCTYPE html>
<html>
<head>
<title>remote</title>
<style>
body {background:#111;color:#0f0;font-family:monospace;text-align:center;padding:20px}
textarea {width:90%;height:400px;background:#222;color:#0f0;border:1px solid #0f0;padding:10px}
button {padding:12px 30px;font-size:16px;background:#0f0;color:#000;margin:10px}
</style>
</head>
<body>
<h2>remote control</h2>
<textarea id="code"></textarea><br>
<button onclick="send()">execute</button>
<button onclick="document.getElementById('code').value=''">clear</button>

<div id="s">ready</div>

<script>
const url = "/api/execute";

async function send() {
    let code = document.getElementById("code").value.trim();
    let s = document.getElementById("s");
    if (!code) {
        s.textContent = "no code";
        return;
    }
    s.textContent = "sending";
    try {
        let res = await fetch(url, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({script: code})
        });
        if (res.ok) s.textContent = "sent";
        else s.textContent = "fail";
    } catch(e) {
        s.textContent = "error";
    }
}
</script>
</body>
</html>
