<!DOCTYPE html>
<html>
<head>
<title>remote</title>
<style>
body {background:#111;color:#0f0;font-family:monospace;text-align:center;padding:20px}
textarea {width:90%;height:400px;background:#222;color:#0f0;border:1px solid #0f0;padding:10px}
input {padding:8px;margin:10px;width:280px}
button {padding:12px 30px;font-size:16px;background:#0f0;color:#000;margin:10px}
</style>
</head>
<body>
<h2>remote control</h2>

<button onclick="genKey()">new key</button><br>
<input id="mykey" placeholder="my key" readonly><br><br>

<strong>Target Key (enter any key here)</strong><br>
<input id="targetkey" placeholder="paste target key here" style="width:400px"><br><br>

<textarea id="code"></textarea><br>
<button onclick="send()">execute</button>
<button onclick="document.getElementById('code').value=''">clear</button>

<div id="s">ready</div>

<script>
let myKey = "";

// Generate my own key
function genKey() {
    myKey = "key_" + Math.random().toString(36).substring(2,15);
    document.getElementById("mykey").value = myKey;
    localStorage.setItem("mycontrolkey", myKey);
}

if (localStorage.getItem("mycontrolkey")) {
    myKey = localStorage.getItem("mycontrolkey");
    document.getElementById("mykey").value = myKey;
} else {
    genKey();
}

async function send() {
    let code = document.getElementById('code').value.trim();
    let targetKey = document.getElementById('targetkey').value.trim();
    let s = document.getElementById('s');

    if (!code) {
        s.textContent = "no code";
        return;
    }
    if (!targetKey) {
        s.textContent = "enter target key";
        return;
    }

    s.textContent = "sending to " + targetKey;
    
    try {
        await fetch("/api/execute", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({key: targetKey, script: code})
        });
        s.textContent = "sent to " + targetKey;
    } catch(e) {
        s.textContent = "error";
    }
}
</script>
</body>
</html>
